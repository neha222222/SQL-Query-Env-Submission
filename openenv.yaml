name: sql_query_env
version: "1.0.0"
description: "SQL Query Environment - Train AI agents to write correct SQL queries against a relational database. Features 9 graded tasks across 3 difficulty levels (easy, medium, hard) covering single-table queries, JOINs, aggregation, subqueries, and more."
author: "neha222222"
tags:
  - sql
  - database
  - natural-language-to-sql
  - text-to-sql
  - reinforcement-learning

tasks:
  - id: easy_1
    name: "Basic SELECT with WHERE and ORDER BY"
    difficulty: easy
    description: "List employees in a department ordered by salary"

  - id: medium_1
    name: "JOIN with GROUP BY aggregation"
    difficulty: medium
    description: "Calculate total revenue per category from completed orders"

  - id: hard_1
    name: "Correlated subquery"
    difficulty: hard
    description: "Find highest-paid employee per department"
